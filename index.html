<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>WISE5 v2 PRO</title>

<style>
body{
 font-family:Arial;
 background:#f4f6f8;
}

.container{
 max-width:900px;
 margin:auto;
 padding:20px;
}

.section{
 background:white;
 padding:20px;
 margin:15px 0;
 border-radius:8px;
}

label{
 display:inline-block;
 width:200px;
}

input,select{
 padding:5px;
 width:180px;
 margin:3px;
}

button{
 padding:8px 12px;
 background:#2ecc71;
 color:white;
 border:none;
 border-radius:5px;
 cursor:pointer;
 margin:4px;
}
</style>

</head>

<body>

<div class="container">

<!-- ✅ HEADER -->
<div class="section" style="text-align:center;">
<h2>WISE5 Sustainability Tool</h2>
<p style="color:#666">Circular sustainability evaluation for chromatographic methods

</p>

<div style="margin-top:10px;">
<button onclick="startAnalysis()">Start Analysis</button>
<button onclick="downloadPNG()">Export PNG</button>
</div>

</div>

<!-- ✅ CONDITIONS -->
<div class="section" id="inputs">

<label>Flow</label><input id="flow"><br>
<label>Time</label><input id="time"><br>
<label>Temp</label><input id="temp"><br>
<label>Resolution</label><input id="res"><br>
<label>Injection</label><input id="inj"><br>
<label>pH</label><input id="ph"><br>

</div>

<!-- ✅ GREEN -->
<div class="section">


<label>Solvent</label>
<select id="solvent">

<option value="1">Water</option>
<option value="0.95">Buffer</option>
<option value="0.9">Ethanol</option>
<option value="0.85">Isopropanol</option>
<option value="0.8">Ethyl acetate</option>
<option value="0.7">Methanol</option>
<option value="0.65">Butanol</option>
<option value="0.6">Acetone</option>
<option value="0.5">Dichloromethane</option>
<option value="0.4">Acetonitrile</option>
<option value="0.35">Chloroform</option>
<option value="0.3">THF</option>
<option value="0.25">Toluene</option>
<option value="0.2">Hexane</option>

<option value="custom">Custom</option>

</select>

<input id="customSolvent"
placeholder="Enter score (0–1)"
style="display:none;"><br>

<label>Organic %</label>
<input id="organic"><br>

<label>Instrument</label>
<select id="instrument">
<option value="1">UPLC</option>
<option value="0.7">HPLC</option>
</select><br>

<label>Analytes</label>
<input id="analytes"><br>


<label>Hazard</label>
<select id="hazard">

<option value="1">None</option>
<option value="0.95">Water / Buffer</option>

<option value="0.9">Weak acid/base</option>
<option value="0.85">Acetic acid</option>

<option value="0.8">HCl / H2SO4</option>
<option value="0.75">H₃PO₄</option>

<option value="0.7">NaOH / KOH</option>
<option value="0.65">Ammonia</option>

<option value="0.6">Reducing agents</option>
<option value="0.5">H₂O₂</option>

<option value="0.45">Organic oxidants</option>
<option value="0.4">Metal catalysts</option>

<option value="0.35">Strong oxidizers</option>
<option value="0.3">Toxic reagents</option>

<option value="custom">Custom</option>

</select>

<input id="customHazard"
placeholder="Enter score (0–1)"
style="display:none;"><br>

</div>

<!-- ✅ RUN BEFORE FIGURE -->
<div class="section" style="text-align:center;">
<button onclick="run()">RUN ANALYSIS</button>
</div>

<!-- ✅ CHART -->
<div class="section" style="text-align:center;">
<svg id="chart" width="350" height="350"></svg>

<!-- ✅ LEGEND -->
<div style="margin-top:10px;font-size:13px">
<span style="color:#2ecc71">■</span> Excellent
&nbsp;&nbsp;
<span style="color:#f1c40f">■</span> Good
&nbsp;&nbsp;
<span style="color:#e67e22">■</span> Moderate
&nbsp;&nbsp;
<span style="color:#e74c3c">■</span> Poor
</div>

</div>

</div>

<script>

// ✅ START ANALYSIS (SCROLL TO INPUTS)
function startAnalysis(){
 document.getElementById("inputs").scrollIntoView({
  behavior:"smooth"
 });

 setTimeout(()=>{
  document.getElementById("flow").focus();
 },500);
}


// ✅ toggle custom (SAFE VERSION)

window.onload = function(){

 document.getElementById("solvent").onchange = function(){
  document.getElementById("customSolvent").style.display =
  this.value === "custom" ? "inline" : "none";
 };

 document.getElementById("hazard").onchange = function(){
  document.getElementById("customHazard").style.display =
  this.value === "custom" ? "inline" : "none";
 };

};

// ✅ color scale
function color(v){
 if(v>=0.8) return "#2ecc71";
 if(v>=0.6) return "#f1c40f";
 if(v>=0.4) return "#e67e22";
 return "#e74c3c";
}

// ✅ RUN
function run(){

if(parseFloat(document.getElementById("flow").value) <= 0){
  alert("Flow should be>0");
  return;
 }

 let f=parseFloat(document.getElementById("flow").value)||1;
 let t=parseFloat(document.getElementById("time").value)||1;
 let temp=parseFloat(document.getElementById("temp").value)||25;
 let res=parseFloat(document.getElementById("res").value)||1;
 let inj=parseFloat(document.getElementById("inj").value)||10;
 let ph=parseFloat(document.getElementById("ph").value)||7;

 let solventSel=document.getElementById("solvent").value;
 let solvent = solventSel==="custom"
 ? parseFloat(document.getElementById("customSolvent").value)||0.5
 : parseFloat(solventSel);

 let hazardSel=document.getElementById("hazard").value;
 let hazard = hazardSel==="custom"
 ? parseFloat(document.getElementById("customHazard").value)||0.5
 : parseFloat(hazardSel);
 let organic=parseFloat(document.getElementById("organic").value)||50;
 let instrument=parseFloat(document.getElementById("instrument").value);
 let analytes=parseFloat(document.getElementById("analytes").value)||3;
// Flow score
let flowScore;
if(f<=0.3) flowScore=1;
else if(f<=0.6) flowScore=0.8;
else if(f<=1.0) flowScore=0.6;
else flowScore=0.4;
// Time score
let timeScore;
if(t<=5) timeScore=1;
else if(t<=10) timeScore=0.8;
else if(t<=20) timeScore=0.6;
else timeScore=0.4;
// Temperature score
let tempScore;
if(temp<40) tempScore=1;
else if(temp<=60) tempScore=0.8;
else tempScore=0.6;
let op=(flowScore+timeScore+tempScore)/3;
 let perf=res>=2?1:0.7;
 let consumption=(f*t<200?1:0.6);
 let composition=(organic<=30?1:organic<=60?0.7:0.4);
 let complexity=(analytes<=5?1:0.6);

function clamp(v){
 return Math.max(0,Math.min(1,v));
}

op=clamp(op);
perf=clamp(perf);
solvent=clamp(solvent);
composition=clamp(composition);
consumption=clamp(consumption);
hazard=clamp(hazard);
instrument=clamp(instrument);
complexity=clamp(complexity);
console.log(op, perf, solvent, composition, consumption, hazard, instrument, complexity);
 draw({
  Operational:op,
  Performance:perf,
  Solvent:solvent,
  Composition:composition,
  Consumption:consumption,
  Hazard:hazard,
  Instrument:instrument,
  Complexity:complexity
 });
}

// ✅ DRAW
function draw(data){

 let svg=document.getElementById("chart");
 svg.innerHTML="";

 let cx=175,cy=175,r=110;

 let values=Object.values(data);
 let labels=Object.keys(data);

const icons={
 Operational:"⚙",
 Performance:"📈",
 Solvent:"⚗",
 Composition:"◔",
 Consumption:"💧",
 Hazard:"🛡",
 Instrument:"🖥",
 Complexity:"✳"
};

 let step=2*Math.PI/values.length;


let score =
(0.15 * data.Operational) +
(0.10 * data.Performance) +
(0.20 * data.Solvent) +
(0.15 * data.Composition) +
(0.10 * data.Consumption) +
(0.15 * data.Hazard) +
(0.05 * data.Instrument) +
(0.10 * data.Complexity);

score = Math.min(1, score);
score=Math.min(1,score);

 values.forEach((v,i)=>{

  let start=-Math.PI/2+i*step;
  let end=start+step;

  let x1=cx+r*Math.cos(start);
  let y1=cy+r*Math.sin(start);

  let x2=cx+r*Math.cos(end);
  let y2=cy+r*Math.sin(end);

  let path=document.createElementNS("http://www.w3.org/2000/svg","path");

  path.setAttribute("d",
   `M ${cx} ${cy}
    L ${x1} ${y1}
    A ${r} ${r} 0 0 1 ${x2} ${y2}
    Z`);

  
path.setAttribute("fill",color(v));

path.setAttribute("stroke","white");
path.setAttribute("stroke-width","4");

svg.appendChild(path);
  
let mid=start+step/2;

let ix=cx+(r-60)*Math.cos(mid);
let iy=cy+(r-60)*Math.sin(mid);

let icon=document.createElementNS(
"http://www.w3.org/2000/svg",
"text"
);

icon.setAttribute("x",ix);
icon.setAttribute("y",iy);

icon.setAttribute("text-anchor","middle");
icon.setAttribute("font-size","24");

icon.setAttribute("fill","white");

icon.textContent=icons[labels[i]];

svg.appendChild(icon);

let tx=cx+(r-35)*Math.cos(mid);
let ty=cy+(r-35)*Math.sin(mid);

let scoreText=document.createElementNS(
"http://www.w3.org/2000/svg",
"text"
);

scoreText.setAttribute("x",tx);
scoreText.setAttribute("y",ty);

scoreText.setAttribute("text-anchor","middle");
scoreText.setAttribute("font-size","16");
scoreText.setAttribute("font-weight","bold");

scoreText.setAttribute("fill","white");

scoreText.textContent=v.toFixed(2);

svg.appendChild(scoreText);


  // ✅ labels
  let mid=start+step/2;
  let lx=cx+(r+25)*Math.cos(mid);
  let ly=cy+(r+25)*Math.sin(mid);

let line=document.createElementNS(
"http://www.w3.org/2000/svg",
"line"
);

let lx1=cx+(r+2)*Math.cos(mid);
let ly1=cy+(r+2)*Math.sin(mid);

let lx2=cx+(r+20)*Math.cos(mid);
let ly2=cy+(r+20)*Math.sin(mid);

line.setAttribute("x1",lx1);
line.setAttribute("y1",ly1);

line.setAttribute("x2",lx2);
line.setAttribute("y2",ly2);

line.setAttribute("stroke","#1f2d3d");
line.setAttribute("stroke-width","2");

svg.appendChild(line);

  let text=document.createElementNS("http://www.w3.org/2000/svg","text");
  text.setAttribute("x",lx);
  text.setAttribute("y",ly);
  text.setAttribute("text-anchor","middle");
  text.setAttribute("font-size","12");
  text.setAttribute("font-weight","bold");
  text.setAttribute("fill","#1f2d3d"); 
  text.textContent=labels[i];
  svg.appendChild(text);
 });

 // center
 let c=document.createElementNS("http://www.w3.org/2000/svg","circle");
 c.setAttribute("cx",cx);
 c.setAttribute("cy",cy);
 c.setAttribute("r",75);
 c.setAttribute("fill","white");
 svg.appendChild(c);

 let txt=document.createElementNS("http://www.w3.org/2000/svg","text");
 txt.setAttribute("x",cx);
 txt.setAttribute("y",cy+5);
 txt.setAttribute("text-anchor","middle");
 txt.setAttribute("font-size","24");
 txt.setAttribute("font-weight","bold");
 
let title=document.createElementNS(
"http://www.w3.org/2000/svg",
"text"
);

title.setAttribute("x",cx);
title.setAttribute("y",cy-20);

title.setAttribute("text-anchor","middle");

title.setAttribute("font-size","20");
title.setAttribute("font-weight","bold");

title.textContent="WISE5";

svg.appendChild(title);

 txt.textContent=score.toFixed(2);
 svg.appendChild(txt);
 
let sub=document.createElementNS(
"http://www.w3.org/2000/svg",
"text"
);

sub.setAttribute("x",cx);
sub.setAttribute("y",cy+35);

sub.setAttribute("text-anchor","middle");

sub.setAttribute("font-size","12");

sub.textContent="Sustainability Score";

svg.appendChild(sub);

}

// ✅ PNG EXPORT
function downloadPNG(){

 let svg=document.getElementById("chart");

 if(svg.innerHTML===""){
  alert("Run analysis first!");
  return;
 }

 let data=new XMLSerializer().serializeToString(svg);

 let img=new Image();
 let url=URL.createObjectURL(new Blob([data],{type:"image/svg+xml"}));

 img.onload=function(){

  let canvas=document.createElement("canvas");
  canvas.width=1000;
  canvas.height=1000;

  let ctx=canvas.getContext("2d");
  ctx.fillStyle="white";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.drawImage(img,0,0,1000,1000);

  let a=document.createElement("a");
  a.href=canvas.toDataURL();
  a.download="WISE5.png";
  a.click();
 };

 img.src=url;
}

</script>

</body>
</html>
